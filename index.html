<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generator QR</title>
    <!-- Najlepsza biblioteka do QR obsługująca UTF-8 i duże zbiory danych -->
    <script src="qrcode.min.js"></script>
    
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
            background: #ffffff; 
            transition: background-color 0.4s ease;
        }
        
        h1 {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        #input-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        input[type="text"] {
            padding: 12px;
            font-size: 1em;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #007bff;
        }

        #result-container { 
            margin-top: 20px; 
            padding: 20px; 
            background: white; 
            border-radius: 10px; 
            text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            display: none; 
            width: 100%; 
            max-width: 400px; 
        }

        #scan-result { 
            font-size: 1.1em; 
            display: block; 
            color: #000;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        #qrcode-container { 
            display: flex; 
            justify-content: center; 
        }

        /* Canvas musi mieć responsywne wymiary */
        canvas {
            width: 250px !important;
            height: 250px !important;
        }
    </style>
</head>
<body>
    
    <h1>Generator QR</h1>

    <div id="input-container">
        <input type="text" id="text-input" placeholder="imię i nazwisko" onkeypress="handleKeyPress(event)">
    </div>

    <div id="result-container">
        <div id="scan-result"></div>
        <div id="qrcode-container">
            <canvas id="qrcode"></canvas>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const resultContainer = document.getElementById('result-container');
        const scanResultText = document.getElementById('scan-result');
        const canvas = document.getElementById('qrcode');

        function generateQRCode() {
            const text = textInput.value.trim().toUpperCase();

            if (!text) {
                alert("Wpisz imię i nazwisko");
                return;
            }

            // Sygnał wibracyjny
            if (navigator.vibrate) navigator.vibrate(100);

            // Wizualne potwierdzenie
            document.body.style.backgroundColor = "#d4edda"; 
            scanResultText.innerText = text;
            resultContainer.style.display = 'block';

            // Generowanie kodu QR za pomocą biblioteki 'qrcode'
            // Ta biblioteka automatycznie wykrywa UTF-8 i optymalizuje kod
            QRCode.toCanvas(canvas, text, {
                width: 500, // Wysoka rozdzielczość renderowania
                margin: 2,
                errorCorrectionLevel: 'M',
                color: {
                    dark: "#000000",
                    light: "#ffffff"
                }
            }, function (error) {
                if (error) console.error(error);
                console.log('QR wygenerowany pomyślnie!');
            });
            
            setTimeout(() => {
                document.body.style.backgroundColor = "#ffffff";
            }, 1000);
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                generateQRCode();
            }
        }
    </script>
</body>
</html>
