<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generator QR</title>
    <!-- Nowa, stabilna biblioteka QRious -->
    <script src="qrious.min.js"></script>
    
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
            background: #ffffff; 
            transition: background-color 0.4s ease;
        }
        
        h1 {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        #input-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.0);
            box-sizing: border-box;
        }

        input[type="text"] {
            padding: 12px;
            font-size: 1em;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #000000;
        }

        button {
            padding: 12px;
            font-size: 1.1em;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #0056b3;
        }

        #result-container { 
            margin-top: 20px; 
            padding: 20px; 
            background: white; 
            border-radius: 10px; 
            text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            display: none; 
            width: 100%; 
            max-width: 400px; 
            box-sizing: border-box;
        }

        #scan-result { 
            font-size: 1.0em; 
            display: block; 
            color: #000;
            word-break: break-all;
            margin-bottom: 15px;
        }

        #qrcode-container { 
            display: flex; 
            justify-content: center; 
        }

        /* Ustawiamy wymiary płótna */
        canvas {
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    
    <h1>Generator QR</h1>

    <div id="input-container">
        <input type="text" id="text-input" placeholder="imię i nazwisko" onkeypress="handleKeyPress(event)">
    </div>

    <div id="result-container">
        <strong id="scan-result">---</strong>
        <div id="qrcode-container">
            <!-- QRious używa elementu canvas zamiast div -->
            <canvas id="qrcode"></canvas>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const resultContainer = document.getElementById('result-container');
        const scanResultText = document.getElementById('scan-result');
        const qrCanvas = document.getElementById('qrcode');

        // Inicjalizujemy instancję QRious raz na zewnątrz
        const qr = new QRious({
            element: qrCanvas,
            size: 200,
            level: 'M' // Poziom Medium - idealny kompromis
        });

        function generateQRCode() {
            const text = textInput.value.trim().toUpperCase();

            if (!text) {
                alert("Wpisz imię i nazwisko");
                return;
            }

            if (navigator.vibrate) {
                navigator.vibrate(100);
            }

            document.body.style.backgroundColor = "#d4edda"; 

            scanResultText.innerText = text;
            resultContainer.style.display = 'block';

            // Zaktualizowanie wartości w bibliotece QRious
            qr.value = text;
            
            setTimeout(() => {
                document.body.style.backgroundColor = "#ffffff";
            }, 1000);
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                generateQRCode();
            }
        }
    </script>
</body>
</html>
